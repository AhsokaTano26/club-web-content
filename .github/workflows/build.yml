name: Build Executables

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install streamlit pyyaml pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --add-data "init.py${{ matrix.os == 'windows-latest' && ';' || ':' }}." --collect-all streamlit --collect-all yaml --copy-metadata streamlit run_app.py

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/